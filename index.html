## 核心创作框架

### 价值公式
产品/内容为用户提供价值 = （新效用 - 旧效用）- （直接成本 + 交易成本 + 间接成本）

### 创作理念
解决特定人群，在特定时间节点下的，特定需求
思考模型：我是谁 → 凭什么 → 帮什么人 → 用什么方式 → 怎么解决 → 什么问题 → 达到什么效果

### 开头职能（让用户完成第一次时间付费）
需要解决四个顾虑：
- "这关我什么事？" ——与我无关的顾虑（精准人群锁定）
- "这有用吗？" ——价值不明的顾虑（价值承诺）
- "你谁啊？我凭什么信你？" ——信任缺失的顾虑（权威/共情）
- "会不会很复杂/耗时？" ——成本过高的顾虑（低门槛暗示）

### 表达循环框架（CREM）
观点(C) → 原理(R) → 案例(E) → 方法(M) → 下一个观点...
长视频是由无数个表达循环嵌套组成的，每15秒给用户一个"续费的理由"。

### 金句进化公式
找矛盾 → 套模型 → 磨节奏
- 【对比模型】：A vs B，两种人生/两种结果
- 【重复模型】：越X，就越Y（强化因果）
- 【比喻模型】：把抽象概念类比成具体事物
- 【极端模型】：最危险的时刻是...
- 【定义模型】：所谓X，不过是Y
磨节奏标准：听感 + 简洁 + 押韵

### 写作质量原则
- 动词 > 名词 > 形容词
- 数据比总结更有力（用具体数字替代"很多"）
- 真实发生过的情感是最佳素材
- 白描永远是最疼的刀
- 养成2句话、2句话写文案的习惯

### 转化逻辑（不要卖产品，卖解决方案）
客观困难（内因外因）→ 传统方案局限性 → 我的解决方案如何生效 → 当前有活动/机会

### 马斯洛需求 × 七宗罪（情绪钩子设计）
- 安全需求 × 恐惧：量化"不改变"的代价，制造紧迫感
- 尊重需求 × 傲慢：提供"碾压"的优越感和成就感
- 归属需求 × 嫉妒：制造对比，你的同学正在偷偷进步
- 自我实现 × 懒惰：主打捷径、模板、秒杀，最小努力最大效果

### 营销转化自查清单
□ 是否把"难受"翻译成了可感知的"成本"（时间/情感/健康）？
□ 是否点明了痛苦的本质（过来人的金句/观点）？
□ 是否用具体例子解释了方法如何起效？
□ 是否有效率提升的量化对比（如1小时抵3小时）？
□ 行动指令是否足够具体、清晰、有力？
□ 结尾是否给了用户一个积极的心理暗示？`;

// ─── LLM Call ──────────────────────────────────────────────
async function callLLM({ endpoint, apiKey, modelId, messages, onChunk, onDone, onError }) {
  try {
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({ model: modelId, messages, stream: true, temperature: 0.72, max_tokens: 6000 }),
    });
    if (!res.ok) { const t = await res.text(); throw new Error(`API ${res.status}: ${t.slice(0,200)}`); }
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let full = '', buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n'); buf = lines.pop() || '';
      for (const line of lines) {
        const t = line.trim();
        if (!t || t === 'data: [DONE]' || !t.startsWith('data: ')) continue;
        try {
          const j = JSON.parse(t.slice(6));
          const d = j.choices?.[0]?.delta?.content || j.choices?.[0]?.delta?.reasoning_content || '';
          if (d) { full += d; onChunk?.(d, full); }
        } catch {}
      }
    }
    onDone?.(full);
    return full;
  } catch (e) { onError?.(e.message); throw e; }
}

// ─── Word Export ───────────────────────────────────────────
function exportWord(content, title) {
  const body = content.split('\n').map(line => {
    if (line.startsWith('# '))   return `<h1 style="font-size:18pt;font-weight:bold;margin:12pt 0">${line.slice(2)}</h1>`;
    if (line.startsWith('## '))  return `<h2 style="font-size:15pt;font-weight:bold;margin:10pt 0">${line.slice(3)}</h2>`;
    if (line.startsWith('### ')) return `<h3 style="font-size:13pt;font-weight:bold;margin:8pt 0">${line.slice(4)}</h3>`;
    if (!line.trim()) return '<p style="margin:4pt 0">&nbsp;</p>';
    return `<p style="margin:6pt 0;text-indent:2em">${line}</p>`;
  }).join('');
  const html = `<!DOCTYPE html><html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><title>${title}</title><style>body{font-family:"Microsoft YaHei",Arial,sans-serif;font-size:12pt;line-height:1.9;margin:2.5cm}</style></head><body>${body}</body></html>`;
  const blob = new Blob(['\ufeff', html], { type: 'application/msword;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${title.slice(0,30)}_${new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')}.doc`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

    danger:   'bg-red-900/40 hover:bg-red-800/50 text-red-400',
    blue:     'bg-blue-600 hover:bg-blue-500 text-white',
  };
  return <button onClick={onClick} disabled={disabled} className={`${base} ${v[variant] || v.primary} ${className}`} {...rest}>{children}</button>;
}

  };

  return (
    <div className="p-6 space-y-5">
      <div className="flex items-start gap-3">
        <div className="w-8 h-8 rounded-full bg-green-600 flex items-center justify-center text-sm font-bold flex-shrink-0 mt-0.5">✓</div>
        <div><div className="font-bold text-white">文案生成完成！</div><div className="text-gray-400 text-xs mt-0.5">可下载 Word 文档，也可以提供反馈帮助 Agent 持续学习你的风格</div></div>
      </div>

      <Card className="border-green-500/20">
        <div className="flex items-start justify-between mb-4">
          <div>
            <div className="font-semibold text-white truncate max-w-xs">{topic}</div>
            <div className="text-xs text-gray-500 mt-0.5">约 {result.length} 字</div>
          </div>
          <div className="flex gap-2 flex-shrink-0">
            <Btn onClick={copy} variant="ghost" className="text-xs">
              {copied ? '✓ 已复制' : '📋 复制'}
            </Btn>
            <Btn onClick={download} variant="blue" className="text-xs">
              📄 下载 Word
            </Btn>
          </div>
        </div>
        <div className="bg-gray-800/60 rounded-xl p-4 max-h-96 overflow-y-auto text-sm text-gray-300 prose-content leading-relaxed">
          {result}
        </div>
      </Card>

      <Card>
        <div className="font-semibold text-white mb-2">🧩 帮助 Agent 学习（可选但推荐）</div>
        <div className="text-xs text-gray-500 mb-3">告诉系统哪里好、哪里需要改进，系统会把你的反馈记录到 Skills 中，下次生成会更符合你的要求</div>
        <Textarea
          placeholder="如：这次开头的反问式设计很好，以后继续保持；金句不够有力，希望更精炼一些；字数超出了，下次要更严格地控制在目标字数内；希望更多用口语化的表达…"
          rows={4} value={feedback} onChange={e => setFeedback(e.target.value)}
        />
        <div className="flex gap-3 mt-3">
          <Btn onClick={saveFeedback} disabled={saved || !feedback.trim()} variant={saved ? 'success' : 'primary'}>
            {saved ? '✓ 已保存到 Skills' : '保存学习记录'}
          </Btn>
        </div>
      </Card>

      <div className="flex gap-3">
        <Btn onClick={onBack} variant="ghost">← 返回修改</Btn>
        <Btn onClick={onRestart}>🔄 开始新的创作</Btn>
      </div>
    </div>
  );
}

// ─── Workflow Page ──────────────────────────────────────────
function WorkflowPage({ model, apiKeys, skills, setSkills, kb }) {
  const [step, setStep] = useState(1);
  const [analysis, setAnalysis]   = useState('');
  const [selCtx, setSelCtx]       = useState('');
  const [generated, setGenerated] = useState('');
  const [topic, setTopic]         = useState('');

  const restart = () => { setStep(1); setAnalysis(''); setSelCtx(''); setGenerated(''); setTopic(''); };

  const STEPS = [
    { n:1, label:'分析爆款' }, { n:2, label:'选择信息' },
    { n:3, label:'生成文案' }, { n:4, label:'下载输出' },
  ];

  return (
    <div>
      {/* Step bar */}
      <div className="border-b border-gray-800 px-6 py-3">
        <div className="flex items-center">
          {STEPS.map((s, i) => (
            <React.Fragment key={s.n}>
              <div className={`flex items-center gap-2 py-1 px-2 rounded-lg ${step === s.n ? 'bg-purple-600/15' : ''}`}>
                <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold transition-all ${
                  step > s.n ? 'bg-green-500 text-white' : step === s.n ? 'bg-purple-600 text-white' : 'bg-gray-700 text-gray-500'
                }`}>{step > s.n ? '✓' : s.n}</div>
                <span className={`text-sm transition-colors ${step === s.n ? 'text-white font-medium' : 'text-gray-600'}`}>{s.label}</span>
              </div>
              {i < 3 && <div className={`step-line mx-1 transition-colors ${step > s.n ? 'bg-green-500/40' : 'bg-gray-800'}`} />}
            </React.Fragment>
          ))}
        </div>
      </div>

      {step === 1 && <Step1 model={model} apiKeys={apiKeys} skills={skills} kb={kb} onNext={r => { setAnalysis(r); setStep(2); }} />}
      {step === 2 && <Step2 analysis={analysis} onBack={() => setStep(1)} onNext={(s, n) => { setSelCtx(s + (n ? '\n\n补充备注：'+n : '')); setStep(3); }} />}
      {step === 3 && <Step3 ctx={selCtx} model={model} apiKeys={apiKeys} skills={skills} kb={kb} onBack={() => setStep(2)} onNext={(c, t) => { setGenerated(c); setTopic(t); setStep(4); }} />}
      {step === 4 && <Step4 result={generated} topic={topic} skills={skills} setSkills={setSkills} onBack={() => setStep(3)} onRestart={restart} />}
    </div>
  );
}

// ─── App ───────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('workflow');
  const [apiKeys, setApiKeys]   = useState(() => load(SK.API_KEYS, {}));
  const [model, setModel]       = useState(() => load(SK.MODEL, null));
  const [kb, setKb]             = useState(() => load(SK.KB, []));
  const [skills, setSkills]     = useState(() => load(SK.SKILLS, null) || DEFAULT_SKILLS);

  const hasModel = !!(model && apiKeys[model?.provider]);

  return (
    <div className="flex min-h-screen">
      <Sidebar page={page} setPage={setPage} hasModel={hasModel} />
      <main className="flex-1 overflow-y-auto">
        {!hasModel && page === 'workflow' && (
          <div className="m-5 p-4 bg-yellow-500/8 border border-yellow-600/30 rounded-2xl flex items-center gap-3">
            <span className="text-2xl">⚠️</span>
            <div>
              <div className="text-yellow-300 text-sm font-semibold">还未配置模型，无法使用创作工作流</div>
              <div className="text-yellow-600 text-xs mt-0.5">请先点击左侧「⚙️ 模型设置」，添加 API Key 并选择一个模型</div>
            </div>
            <Btn onClick={() => setPage('settings')} variant="ghost" className="ml-auto text-yellow-300 border-yellow-600/50 hover:border-yellow-500 flex-shrink-0">去配置 →</Btn>
          </div>
        )}
        {page === 'workflow' && <WorkflowPage model={model} apiKeys={apiKeys} skills={skills} setSkills={setSkills} kb={kb} />}
        {page === 'knowledge' && <KnowledgePage kb={kb} setKb={setKb} />}
        {page === 'skills'    && <SkillsPage skills={skills} setSkills={setSkills} />}
        {page === 'settings'  && <SettingsPage apiKeys={apiKeys} setApiKeys={setApiKeys} model={model} setModel={setModel} />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
